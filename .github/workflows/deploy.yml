name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
#   pull_request:
#     branches: [main]
#     types: [closed]

# Only run deployment when PR is merged or direct push to main
jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    
    env:
      AZURE_RESOURCE_GROUP: rg-agentcolony
      AZURE_CONTAINER_APP: agentcolony
      AZURE_ACR_NAME: agentcolonyacr
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_ACR_NAME }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry ${{ env.AZURE_ACR_NAME }} \
            --image agentcolony:${{ env.IMAGE_TAG }} \
            --image agentcolony:latest \
            --file Dockerfile \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.AZURE_ACR_NAME }}.azurecr.io/agentcolony:${{ env.IMAGE_TAG }}

      - name: Get deployment URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🌍 Deployed to: https://$FQDN"
          echo "### 🌍 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** agentcolony:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
