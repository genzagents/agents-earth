name: CI — PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Check server syntax (node --check)
        working-directory: server
        run: |
          find . -name "*.js" -not -path "./node_modules/*" | \
            xargs -I{} node --check {} && echo "All JS files passed syntax check"

      - name: Install root dependencies (ESLint)
        run: npm install

      - name: Lint frontend JS
        run: npm run lint

      - name: Validate colony.yaml
        run: |
          python3 -c "import yaml; yaml.safe_load(open('colony.yaml'))" && \
            echo "colony.yaml is valid YAML"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: |
          docker build -t agentcolony:ci-check --file Dockerfile . && \
            echo "Docker build succeeded"

  test:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: [lint-and-validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Run tests
        working-directory: server
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "No test script defined yet — skipping (TODO: add tests)"
          fi
